<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LES Ecology Center - Event Workflow Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #efe7de 100%);
            color: #2c2416;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1d5432 0%, #2d7a52 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(29, 84, 50, 0.2);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .view-toggle button {
            padding: 10px 20px;
            border: 2px solid #d4cec0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .view-toggle button.active {
            background: #1d5432;
            color: white;
            border-color: #1d5432;
        }

        #addEventBtnMain {
            background: linear-gradient(135deg, #1d5432 0%, #2d7a52 100%);
            font-size: 1.05em;
            padding: 12px 32px;
            box-shadow: 0 4px 12px rgba(29, 84, 50, 0.4);
        }

        #addEventBtnMain:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(29, 84, 50, 0.5);
        }

        #addEventBtnMain:active {
            transform: translateY(0);
        }

        .stats-bar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2.2em;
            font-weight: 700;
            color: #1d5432;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #6a5a4a;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 500;
            margin-bottom: 8px;
            color: #5a4a3a;
            font-size: 0.9em;
        }

        .control-group select,
        .control-group input {
            padding: 10px;
            border: 1px solid #d4cec0;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95em;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #1d5432;
            box-shadow: 0 0 0 3px rgba(29, 84, 50, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            border: 1px solid #d4cec0;
            border-radius: 6px;
            background: white;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin: 0;
            font-weight: 400;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1d5432;
        }

        .control-group select[multiple] {
            min-height: 80px;
            padding: 8px;
        }

        .control-group select[multiple] option {
            padding: 6px;
            margin: 2px 0;
        }

        .control-group select[multiple] option:checked {
            background: #1d5432;
            color: white;
        }

        .events-view {
            display: grid;
            gap: 20px;
        }

        .event-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #1d5432;
            transition: all 0.3s ease;
        }

        .event-card:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .event-card.past {
            border-left-color: #999;
            opacity: 0.8;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .event-title {
            flex: 1;
        }

        .event-title h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            color: #2c2416;
        }

        .event-meta {
            display: flex;
            gap: 20px;
            font-size: 0.95em;
            color: #6a5a4a;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .owner-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            background: #e8f0d8;
            color: #556b2f;
        }

        .owner-badge.maddy {
            background: #fce4e4;
            color: #8b3a3a;
        }

        .owner-badge.hadas {
            background: #e4f1fc;
            color: #3a5a8b;
        }

        .owner-badge.gretel {
            background: #f0e4fc;
            color: #5a3a8b;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-right: 4px;
        }

        .category-outreach {
            background: #fef3c7;
            color: #92400e;
        }

        .category-education {
            background: #e0f2fe;
            color: #0c4a6e;
        }

        .category-stewardship {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .status-planning {
            background: #fef3c7;
            color: #92400e;
        }

        .status-hold {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-confirmed {
            background: #dcfce7;
            color: #166534;
        }

        .progress-bar {
            width: 120px;
            height: 6px;
            background: #e8ddd0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1d5432, #2d7a52);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85em;
            color: #6a5a4a;
            font-weight: 500;
        }

        .workflow-phases {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e8ddd0;
        }

        .phase {
            background: #f9f7f2;
            padding: 15px;
            border-radius: 8px;
        }

        .phase-title {
            font-weight: 600;
            color: #1d5432;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }

        .task input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1d5432;
        }

        .task label {
            flex: 1;
            cursor: pointer;
            user-select: none;
        }

        .task input[type="checkbox"]:checked + label {
            color: #999;
            text-decoration: line-through;
        }

        .task.na input[type="checkbox"],
        .task.na label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #openTasksContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .open-task-card {
            background: white;
            border-left: 4px solid #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .open-task-card.deadline-soon {
            border-left-color: #ffa94d;
        }

        .open-task-card.deadline-overdue {
            border-left-color: #ff6b6b;
            background: #ffe0e0;
        }

        .task-event-name {
            font-weight: 600;
            color: #1d5432;
            margin-bottom: 4px;
        }

        .task-description {
            color: #6a5a4a;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .task-deadline {
            font-size: 0.85em;
            color: #ff6b6b;
            font-weight: 500;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .calendar-container {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: none;
            width: 100%;
        }

        .calendar-container.active {
            display: block;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-header h2 {
            color: #1d5432;
            font-size: 1.5em;
            margin: 0;
        }

        .calendar-header button {
            background: #1d5432;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .calendar-header button:hover {
            background: #2d7a52;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(75px, 1fr));
            gap: 6px;
            width: 100%;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            color: #1d5432;
            padding: 15px 8px;
            background: #f9f7f2;
            border-radius: 6px;
        }

        .calendar-day {
            border: 1px solid #e8ddd0;
            border-radius: 6px;
            padding: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 85px;
            background: white;
            overflow: hidden;
        }

        .calendar-day:hover {
            background: #f9f7f2;
            border-color: #1d5432;
        }

        .calendar-day.other-month {
            color: #ccc;
            background: #fafaf8;
        }

        .calendar-day.today {
            background: #e8f5ed;
            border-color: #1d5432;
            font-weight: 600;
        }

        .calendar-day-number {
            font-weight: 600;
            color: #2c2416;
            margin-bottom: 2px;
            font-size: 0.85em;
        }

        .calendar-day-events {
            font-size: 0.65em;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .calendar-day-event {
            background: #1d5432;
            padding: 2px 4px;
            border-radius: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            font-weight: 500;
            line-height: 1.1;
        }

        .calendar-day-event.outreach {
            background: #f59e0b;
        }

        .calendar-day-event.education {
            background: #3b82f6;
        }

        .calendar-day-event.stewardship {
            background: #10b981;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #1d5432;
            font-size: 1.3em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #5a4a3a;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #d4cec0;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95em;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1d5432;
            box-shadow: 0 0 0 3px rgba(29, 84, 50, 0.1);
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .modal-buttons .save-btn {
            background: #1d5432;
            color: white;
        }

        .modal-buttons .save-btn:hover {
            background: #2d7a52;
        }

        .modal-buttons .cancel-btn {
            background: #e8ddd0;
            color: #2c2416;
        }

        .modal-buttons .cancel-btn:hover {
            background: #d4cec0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .event-header {
                flex-direction: column;
                gap: 10px;
            }

            .event-meta {
                flex-wrap: wrap;
            }

            .workflow-phases {
                grid-template-columns: 1fr;
            }

            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .calendar-day {
                min-height: 80px;
                font-size: 0.85em;
                padding: 8px;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Event Workflow Dashboard</h1>
            <p>LES Ecology Center - Street Tree Care & Community Engagement</p>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" data-view="list">📋 List View</button>
            <button class="view-btn" data-view="calendar">📅 Calendar View</button>
            <button class="view-btn" data-view="tasks">📌 Open Tasks</button>
            <button class="view-btn" data-view="stats">📊 Stats</button>
            <button id="addEventBtnMain" style="padding: 12px 30px; background: #1d5432; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1em; margin-left: 10px; box-shadow: 0 2px 8px rgba(29, 84, 50, 0.3); transition: all 0.3s ease;">➕ Add Event</button>
        </div>

        <div id="listView" class="list-view-container">
            <div class="controls">
                <div class="control-group">
                    <label>Filter by Owner</label>
                    <div class="checkbox-group" id="filterOwner">
                        <label><input type="checkbox" value="Maddy"> Maddy</label>
                        <label><input type="checkbox" value="Hadas"> Hadas</label>
                        <label><input type="checkbox" value="Gretel"> Gretel</label>
                    </div>
                </div>
                <div class="control-group">
                    <label for="filterTiming">Filter by Timing</label>
                    <select id="filterTiming">
                        <option value="">All Events</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="past">Past</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Filter by Category</label>
                    <div class="checkbox-group" id="filterCategory">
                        <label><input type="checkbox" value="Outreach"> Outreach</label>
                        <label><input type="checkbox" value="Education"> Education</label>
                        <label><input type="checkbox" value="Stewardship"> Stewardship</label>
                    </div>
                </div>
                <div class="control-group">
                    <label>Filter by Status</label>
                    <div class="checkbox-group" id="filterStatus">
                        <label><input type="checkbox" value="Planning"> Planning</label>
                        <label><input type="checkbox" value="Hold"> Hold</label>
                        <label><input type="checkbox" value="Confirmed"> Confirmed</label>
                    </div>
                </div>
                <div class="control-group">
                    <label for="sortOrder">Sort Events</label>
                    <select id="sortOrder">
                        <option value="earliest">Earliest to Latest</option>
                        <option value="latest">Latest to Earliest</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="searchEvents">Search Events</label>
                    <input type="text" id="searchEvents" placeholder="Search by name or location...">
                </div>
            </div>

            <div class="events-view" id="eventsContainer">
                <div class="empty-state">
                    <p>No events loaded yet.</p>
                </div>
            </div>
        </div>

        <div id="tasksView" class="tasks-view-container" style="display: none;">
            <div id="tasksFilterOwner" style="display: flex; gap: 12px; margin-bottom: 20px; align-items: center;">
                <label style="font-weight: 600; font-size: 0.95em; white-space: nowrap;">Owner:</label>
                <label style="display: flex; align-items: center; gap: 4px; margin: 0; font-size: 0.9em;"><input type="checkbox" value="all" checked> All</label>
                <label style="display: flex; align-items: center; gap: 4px; margin: 0; font-size: 0.9em;"><input type="checkbox" value="Maddy"> Maddy</label>
                <label style="display: flex; align-items: center; gap: 4px; margin: 0; font-size: 0.9em;"><input type="checkbox" value="Hadas"> Hadas</label>
                <label style="display: flex; align-items: center; gap: 4px; margin: 0; font-size: 0.9em;"><input type="checkbox" value="Gretel"> Gretel</label>
            </div>
            <div id="openTasksContainer"></div>
        </div>

        <div id="statsView" class="stats-bar" style="display: none;"></div>

        <div id="calendarView" class="calendar-container">
            <div class="calendar-header">
                <div>
                    <button id="prevMonth">← Previous</button>
                    <h2 id="calendarTitle" style="display: inline-block; margin: 0 20px;"></h2>
                    <button id="nextMonth">Next →</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <!-- Event Creation Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Event</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" required placeholder="e.g., Spring Tree Care">
                </div>
                <div class="form-group">
                    <label for="eventDate">Date</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventTime">Start Time</label>
                    <input type="time" id="eventTime">
                </div>
                <div class="form-group">
                    <label for="eventEndTime">End Time</label>
                    <input type="time" id="eventEndTime">
                </div>
                <div class="form-group">
                    <label for="eventOwner">Owner</label>
                    <select id="eventOwner" required>
                        <option value="">Select Owner</option>
                        <option value="Maddy">Maddy</option>
                        <option value="Hadas">Hadas</option>
                        <option value="Gretel">Gretel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventLocation">Location</label>
                    <input type="text" id="eventLocation" placeholder="e.g., Tompkins Square Park">
                </div>
                <div class="form-group">
                    <label for="eventPrimaryCategory">Primary Category</label>
                    <select id="eventPrimaryCategory" required>
                        <option value="">Select Category</option>
                        <option value="Outreach">Outreach</option>
                        <option value="Education">Education</option>
                        <option value="Stewardship">Stewardship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventSecondaryCategory">Secondary Category (Optional)</label>
                    <select id="eventSecondaryCategory">
                        <option value="">None</option>
                        <option value="Outreach">Outreach</option>
                        <option value="Education">Education</option>
                        <option value="Stewardship">Stewardship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventType">Event Type</label>
                    <input type="text" id="eventType" placeholder="e.g., Workshop, Tabling, STC Event">
                </div>
                <div class="form-group">
                    <label for="eventStatus">Status</label>
                    <select id="eventStatus" required>
                        <option value="Planning">Planning</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Hold">Hold</option>
                    </select>
                </div>
                <div class="form-group">

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            document.getElementById('calendarTitle').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();

            let html = '';

            const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayHeaders.forEach(day => {
                html += `<div class="calendar-day-header">${day}</div>`;
            });

            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const isToday = dateObj.toDateString() === today.toDateString();
                let dayEvents = events.filter(e => e.date.toDateString() === dateObj.toDateString());
                const eventsList = dayEvents.map(e => {
                    const color = CATEGORY_COLORS[e.primaryCategory] || '#1d5432';
                    return `<div class="calendar-day-event" style="background: ${color}; cursor: pointer;" data-event-id="${e.id}" onclick="event.stopPropagation(); viewEventDetail(${e.id})">${e.name}</div>`;
                }).join('');

                const todayClass = isToday ? 'today' : '';
                html += `<div class="calendar-day ${todayClass}" onclick="openEventModal(new Date(${year}, ${month}, ${day}))" style="min-height: 85px;"><div class="calendar-day-number">${day}</div><div class="calendar-day-events">${eventsList}</div></div>`;
            }

            const totalCells = firstDay + daysInMonth;
            const remainingDays = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = html;
        }

        function viewEventDetail(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;

            const progress = getEventProgress(event);
            document.querySelector('.modal-header h3').textContent = event.name;
            document.getElementById('eventForm').style.display = 'none';

            const detailsHtml = `
                <div style="margin-top: 20px;">
                    <div style="margin-bottom: 15px;">
                        <span class="category-badge category-${event.primaryCategory.toLowerCase()}">${event.primaryCategory}</span>
                        ${event.secondaryCategory ? `<span class="category-badge category-${event.secondaryCategory.toLowerCase()}">${event.secondaryCategory}</span>` : ''}
                        <span class="status-badge status-${(event.status || 'planning').toLowerCase()}">${event.status || 'Planning'}</span>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <p style="margin: 5px 0;"><strong>Owner:</strong> ${event.owner}</p>
                        <p style="margin: 5px 0;"><strong>Date:</strong> ${formatDate(event.date)} at ${event.time}${event.endTime ? ' - ' + event.endTime : ''}</p>
                        ${event.location ? `<p style="margin: 5px 0;"><strong>Location:</strong> ${event.location}</p>` : ''}
                        <p style="margin: 5px 0;"><strong>Type:</strong> ${event.type || 'N/A'}</p>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <p><strong>Progress: ${progress}%</strong></p>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                        <div style="background: #f9f7f2; padding: 12px; border-radius: 8px;">
                            <div style="font-weight: 600; color: #1d5432; margin-bottom: 8px; font-size: 0.9em;">📋 Setup</div>
                            ${['brief', 'eventbrite', 'calendar', 'comms'].map(key => {
                                const task = TASK_DEADLINES.setup.find(t => t.key === key);
                                const value = event[key];
                                const isChecked = value === 'Yes' || value === true;
                                return `<div style="font-size: 0.85em; margin-bottom: 4px; color: ${isChecked ? '#999' : '#333'}; text-decoration: ${isChecked ? 'line-through' : 'none'};"><input type="checkbox" ${isChecked ? 'checked' : ''} disabled style="margin-right: 4px;"> ${task.label}</div>`;
                            }).join('')}

                            ${['compost', 'opsCheckin', 'reminder'].map(key => {
                                const task = TASK_DEADLINES.execution.find(t => t.key === key);

        function openEventModal(date) {
            selectedDate = date;
            document.getElementById('eventDate').value = formatDateForInput(date);
            document.getElementById('eventForm').reset();
            document.querySelector('.modal-header h3').textContent = 'Create New Event';
            document.getElementById('eventForm').style.display = 'block';
            document.getElementById('eventModal').classList.add('active');
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('active');
            document.getElementById('eventForm').reset();
            document.getElementById('eventForm').style.display = 'block';
            const details = document.getElementById('eventDetails');
            if (details) details.remove();
            document.querySelector('.modal-header h3').textContent = 'Create New Event';
        }

        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function switchView(view) {
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-view="${view}"]`).classList.add('active');

            document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('calendarView').classList.toggle('active', view === 'calendar');
            document.getElementById('tasksView').style.display = view === 'tasks' ? 'block' : 'none';
            document.getElementById('statsView').style.display = view === 'stats' ? 'flex' : 'none';

            if (view === 'calendar') renderCalendar();
            if (view === 'tasks') renderOpenTasks();
            if (view === 'stats') updateStats();
        }

        function init() {
            loadEvents();
            setupEventListeners();
            setupCalendarListeners();
            applyFilters();

        function setupCalendarListeners() {
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => switchView(e.target.dataset.view));
            });

            document.getElementById('prevMonth').addEventListener('click', () => {
                currentMonth.setMonth(currentMonth.getMonth() - 1);
                renderCalendar();
            });

            document.getElementById('nextMonth').addEventListener('click', () => {
                currentMonth.setMonth(currentMonth.getMonth() + 1);
                renderCalendar();
            });

            document.getElementById('addEventBtnMain').addEventListener('click', () => openEventModal(new Date()));
            document.getElementById('closeModal').addEventListener('click', closeEventModal);
            document.getElementById('cancelBtn').addEventListener('click', closeEventModal);

            document.getElementById('eventModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('eventModal')) closeEventModal();
            });

            document.getElementById('eventForm').addEventListener('submit', (e) => {
                e.preventDefault();

                const primaryCategory = document.getElementById('eventPrimaryCategory').value;
                const secondaryCategory = document.getElementById('eventSecondaryCategory').value;
                const category = secondaryCategory ? `${primaryCategory}, ${secondaryCategory}` : primaryCategory;

                const newEvent = {
                    id: Math.max(...events.map(e => e.id), 0) + 1,
                    name: document.getElementById('eventName').value,

                    date: new Date(document.getElementById('eventDate').value),

                    location: document.getElementById('eventLocation').value,
                    primaryCategory: primaryCategory,
                    secondaryCategory: secondaryCategory,
                    category: category,
                    type: document.getElementById('eventType').value,
                    status: document.getElementById('eventStatus').value || 'Planning',

                    compost: 'No', opsCheckin: 'No', reminder: 'No',
                    report: 'No', treeMap: 'No', thankYou: 'No'
                };

                events.push(newEvent);
                saveEvents();
                closeEventModal();
                renderCalendar();
                applyFilters();
            });

            document.querySelectorAll('#tasksFilterOwner input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', () => renderOpenTasks());
            });
        }

        function loadEvents() {
            localStorage.removeItem('lesEvents');
            events = getSampleData();
        }

        function saveEvents() {
            localStorage.setItem('lesEvents', JSON.stringify(events));
        }

        function setupEventListeners() {
            document.querySelectorAll('#filterOwner input[type="checkbox"]').forEach(cb => cb.addEventListener('change', applyFilters));
            document.querySelectorAll('#filterCategory input[type="checkbox"]').forEach(cb => cb.addEventListener('change', applyFilters));
            document.querySelectorAll('#filterStatus input[type="checkbox"]').forEach(cb => cb.addEventListener('change', applyFilters));
            document.getElementById('filterTiming').addEventListener('change', applyFilters);
            document.getElementById('sortOrder').addEventListener('change', applyFilters);
            document.getElementById('searchEvents').addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const selectedOwners = Array.from(document.querySelectorAll('#filterOwner input[type="checkbox"]:checked')).map(cb => cb.value);
            const selectedCategories = Array.from(document.querySelectorAll('#filterCategory input[type="checkbox"]:checked')).map(cb => cb.value);
            const selectedStatuses = Array.from(document.querySelectorAll('#filterStatus input[type="checkbox"]:checked')).map(cb => cb.value);

            const timing = document.getElementById('filterTiming').value;
            const sortOrder = document.getElementById('sortOrder').value;
            const search = document.getElementById('searchEvents').value.toLowerCase();

            const now = new Date();

            filteredEvents = events.filter(event => {
                if (selectedOwners.length > 0 && !selectedOwners.includes(event.owner)) return false;

                if (selectedCategories.length > 0) {
                    const hasMatchingCategory = selectedCategories.some(cat =>
                        event.primaryCategory === cat || event.secondaryCategory === cat
                    );
                    if (!hasMatchingCategory) return false;
                }

                if (selectedStatuses.length > 0 && !selectedStatuses.includes(event.status || 'Planning')) return false;

                if (timing === 'upcoming' && event.date < now) return false;
                if (timing === 'past' && event.date >= now) return false;

                const location = event.location || '';
                if (search && !event.name.toLowerCase().includes(search) && !location.toLowerCase().includes(search)) return false;

                return true;
            });

            filteredEvents.sort((a, b) => sortOrder === 'latest' ? b.date - a.date : a.date - b.date);

            updateStats();
            renderEvents();
        }

        function createPieChart(data, colors, containerWidth = 200) {
            const items = Object.entries(data).filter(([_, count]) => count > 0);
            if (items.length === 0) return '<div style="text-align: center; color: #999;">No data</div>';

            const total = items.reduce((sum, [_, count]) => sum + count, 0);
            const radius = 60;
            let currentAngle = -Math.PI / 2;

            let pathD = '';
            const slices = items.map(([label, count]) => {
                const sliceAngle = (count / total) * 2 * Math.PI;
                const startAngle = currentAngle;
                const endAngle = currentAngle + sliceAngle;

                const x1 = 100 + radius * Math.cos(startAngle);
                const y1 = 100 + radius * Math.sin(startAngle);
                const x2 = 100 + radius * Math.cos(endAngle);
                const y2 = 100 + radius * Math.sin(endAngle);

                const largeArc = sliceAngle > Math.PI ? 1 : 0;
                const path = `M 100 100 L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;

                const midAngle = startAngle + sliceAngle / 2;
                const labelX = 100 + (radius * 0.65) * Math.cos(midAngle);
                const labelY = 100 + (radius * 0.65) * Math.sin(midAngle);

                currentAngle = endAngle;

                return { path, label, count, color: colors[label] || '#999', labelX, labelY };
            });

            const svg = `
                <svg width="200" height="280" style="margin: 0 auto; display: block;">
                    ${slices.map(s => `<path d="${s.path}" fill="${s.color}" stroke="white" stroke-width="2"/>`).join('')}
                    ${slices.map(s => `<text x="${s.labelX}" y="${s.labelY}" text-anchor="middle" font-size="11" font-weight="600" fill="white" pointer-events="none">${s.count}</text>`).join('')}
                </svg>
                <div style="display: flex; flex-direction: column; gap: 6px; font-size: 0.85em; margin-top: 10px;">
                    ${items.map(([label, count]) => `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 12px; height: 12px; background: ${colors[label] || '#999'}; border-radius: 2px;"></div>
                            <span>${label}: ${count}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            return svg;
        }

        function getEventsByMonthYear(month, year) {
            return events.filter(e => {
                const eventMonth = e.date.toLocaleDateString('en-US', { month: 'short' });
                const eventYear = e.date.getFullYear().toString();
                const monthMatch = month === 'All' || eventMonth === month;
                const yearMatch = year === 'All' || eventYear === year;
                return monthMatch && yearMatch;
            });
        }

        function updateStats() {
            const statsBar = document.getElementById('statsView');
            const now = new Date();

            // Get all months and years from events
            const monthSet = new Set();
            const yearSet = new Set();
            events.forEach(e => {
                monthSet.add(e.date.toLocaleDateString('en-US', { month: 'short' }));
                yearSet.add(e.date.getFullYear().toString());
            });
            const monthOptions = ['All', ...Array.from(monthSet).sort()];
            const yearOptions = ['All', ...Array.from(yearSet).sort()];

            // Get selected month and year from localStorage
            let selectedMonth = localStorage.getItem('selectedStatsMonth') || 'All';
            let selectedYear = localStorage.getItem('selectedStatsYear') || 'All';
            if (!monthOptions.includes(selectedMonth)) selectedMonth = 'All';
            if (!yearOptions.includes(selectedYear)) selectedYear = 'All';
            localStorage.setItem('selectedStatsMonth', selectedMonth);
            localStorage.setItem('selectedStatsYear', selectedYear);

            // Filter events by month and year
            const filteredEventsByMonth = getEventsByMonthYear(selectedMonth, selectedYear);

            // Basic counts
            const byOwner = { Maddy: 0, Hadas: 0, Gretel: 0 };
            const byCategory = { Outreach: 0, Education: 0, Stewardship: 0 };
            const byStatus = { Planning: 0, Hold: 0, Confirmed: 0 };
            const byMonth = {};
            let confirmedCount = 0;
            let completedCount = 0;

            filteredEventsByMonth.forEach(e => {
                byOwner[e.owner]++;
                byCategory[e.primaryCategory]++;
                byStatus[e.status || 'Planning']++;

                const monthKey = e.date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                byMonth[monthKey] = (byMonth[monthKey] || 0) + 1;

                if (e.status === 'Confirmed') confirmedCount++;
                if (e.report === 'Yes' && e.treeMap === 'Yes') completedCount++;
            });

            const avgProgress = filteredEventsByMonth.length > 0 ? Math.round(filteredEventsByMonth.reduce((sum, e) => sum + getEventProgress(e), 0) / filteredEventsByMonth.length) : 0;
            const monthEntries = Object.entries(byMonth).sort((a, b) => new Date(a[0]) - new Date(b[0]));
            const ownerColors = { Maddy: '#f59e0b', Hadas: '#3b82f6', Gretel: '#10b981' };
            const categoryColors = { Outreach: '#f59e0b', Education: '#3b82f6', Stewardship: '#10b981' };
            const statusColors = { Planning: '#fbbf24', Hold: '#ef4444', Confirmed: '#34d399' };

            statsBar.innerHTML = `
                <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 20px; align-items: flex-end;">
                    <div>
                        <label style="font-weight: 600; color: #1d5432; display: block; margin-bottom: 8px; font-size: 0.95em;">Month:</label>
                        <select id="statsMonthFilter" style="padding: 8px 12px; border: 2px solid #d4cec0; border-radius: 8px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 0.9em;">
                            ${monthOptions.map(month => `<option value="${month}" ${month === selectedMonth ? 'selected' : ''}>${month}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label style="font-weight: 600; color: #1d5432; display: block; margin-bottom: 8px; font-size: 0.95em;">Year:</label>
                        <select id="statsYearFilter" style="padding: 8px 12px; border: 2px solid #d4cec0; border-radius: 8px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 0.9em;">
                            ${yearOptions.map(year => `<option value="${year}" ${year === selectedYear ? 'selected' : ''}>${year}</option>`).join('')}
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;">
                    <div class="stat-card">
                        <div class="stat-number">${filteredEventsByMonth.length}</div>
                        <div class="stat-label">Total Events</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${confirmedCount}</div>
                        <div class="stat-label">Confirmed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${completedCount}</div>
                        <div class="stat-label">Fully Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${avgProgress}%</div>
                        <div class="stat-label">Avg Progress</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                    <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-weight: 600; color: #1d5432; margin-bottom: 12px; font-size: 0.95em;">By Owner</div>
                        ${createPieChart(byOwner, ownerColors)}
                    </div>
                    <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-weight: 600; color: #1d5432; margin-bottom: 12px; font-size: 0.95em;">By Category</div>
                        ${createPieChart(byCategory, categoryColors)}
                    </div>
                    <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <div style="font-weight: 600; color: #1d5432; margin-bottom: 12px; font-size: 0.95em;">By Status</div>
                        ${createPieChart(byStatus, statusColors)}
                    </div>
                </div>

                <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <div style="font-weight: 600; color: #1d5432; margin-bottom: 12px; font-size: 0.95em;">Events Timeline</div>
                    <div style="overflow-x: auto; padding-bottom: 10px;">
                        <div style="display: flex; align-items: flex-end; gap: 12px; min-width: max-content;">
                            ${monthEntries.map(([month, count]) => {
                                const maxMonthCount = Math.max(...Object.values(byMonth));
                                const barHeight = (count / maxMonthCount) * 100;
                                const [monthPart, yearPart] = month.split(' ');
                                const monthMatch = selectedMonth === 'All' || monthPart === selectedMonth;
                                const yearMatch = selectedYear === 'All' || yearPart === selectedYear;
                                const opacity = (monthMatch && yearMatch) ? 1 : 0.4;
                                return `
                                    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 50px; opacity: ${opacity};">
                                        <div style="font-size: 0.8em; color: #666; font-weight: 500; height: 16px;">${count}</div>
                                        <div style="width: 40px; background: #1d5432; border-radius: 4px; height: ${Math.max(barHeight, 30)}px;"></div>
                                        <div style="font-size: 0.8em; text-align: center; color: #666; font-weight: 500;">${month}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Add event listeners to filters
            document.getElementById('statsMonthFilter').addEventListener('change', (e) => {
                localStorage.setItem('selectedStatsMonth', e.target.value);
                updateStats();
            });
            document.getElementById('statsYearFilter').addEventListener('change', (e) => {
                localStorage.setItem('selectedStatsYear', e.target.value);
                updateStats();
            });
        }

        function getEventProgress(event) {
            let completed = 0, total = 0;
            Object.values(TASK_DEADLINES).forEach(phase => {
                phase.forEach(task => {
                    const value = event[task.key];
                    if (value !== 'N/A') {
                        total++;
                        if (value === 'Yes' || value === true) completed++;
                    }
                });
            });
            return total > 0 ? Math.round((completed / total) * 100) : 0;
        }

        function renderEvents() {
            const container = document.getElementById('eventsContainer');
            if (filteredEvents.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No events match your filters.</p></div>';
                return;
            }

            const now = new Date();
            container.innerHTML = filteredEvents.map(event => {
                const isPast = event.date < now;
                const progress = getEventProgress(event);

                return `
                    <div class="event-card ${isPast ? 'past' : ''}">
                        <div class="event-header">
                            <div class="event-title">
                                <h3>${event.name}</h3>
                                <div style="margin-bottom: 8px;">
                                    <span class="category-badge category-${event.primaryCategory.toLowerCase()}">${event.primaryCategory}</span>
                                    ${event.secondaryCategory ? `<span class="category-badge category-${event.secondaryCategory.toLowerCase()}">${event.secondaryCategory}</span>` : ''}
                                    <span class="status-badge status-${(event.status || 'planning').toLowerCase()}">${event.status || 'Planning'}</span>
                                </div>
                                <div class="event-meta">
                                    <span class="owner-badge ${event.owner.toLowerCase()}">${event.owner}</span>
                                    <span class="meta-item">📅 ${formatDate(event.date)} ${event.time}${event.endTime ? ' - ' + event.endTime : ''}</span>
                                    ${event.location ? `<span class="meta-item">📍 ${event.location}</span>` : ''}
                                </div>
                            </div>
                            <div class="event-status">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <div class="progress-text">${progress}% complete</div>
                            </div>
                        </div>

                        <div class="workflow-phases">
                            <div class="phase">
                                <div class="phase-title">📋 Setup</div>
                                <div class="tasks">
                                    ${renderTasks(event, 'setup')}
                                </div>
                            </div>
                            <div class="phase">
                                <div class="phase-title">🚀 Execution</div>
                                <div class="tasks">
                                    ${renderTasks(event, 'execution')}
                                </div>
                            </div>
                            <div class="phase">
                                <div class="phase-title">✅ Completion</div>
                                <div class="tasks">
                                    ${renderTasks(event, 'completion')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.task input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', handleTaskToggle);
            });
        }

        function renderTasks(event, phase) {
            return Object.values(TASK_DEADLINES).find((_, idx) => {
                const phases = ['setup', 'execution', 'completion'];
                return phases[idx] === phase;
            })?.map(task => {
                const value = event[task.key];
                const isNA = value === 'N/A';
                const isChecked = value === 'Yes' || value === true;

                return `
                    <div class="task ${isNA ? 'na' : ''}">
                        <input
                            type="checkbox"
                            id="task-${event.id}-${task.key}"
                            data-event-id="${event.id}"
                            data-task-key="${task.key}"
                            ${isChecked ? 'checked' : ''}
                            ${isNA ? 'disabled' : ''}
                        >
                        <label for="task-${event.id}-${task.key}">${task.label}</label>
                    </div>
                `;
            }).join('') || '';
        }

        function handleTaskToggle(e) {
            const eventId = parseInt(e.target.dataset.eventId);
            const taskKey = e.target.dataset.taskKey;
            const isChecked = e.target.checked;

            const event = events.find(e => e.id === eventId);
            if (event) {
                event[taskKey] = isChecked ? 'Yes' : 'No';
                saveEvents();
                applyFilters();
            }
        }

        function renderOpenTasks() {
            const container = document.getElementById('openTasksContainer');
            const now = new Date();
            const openTasks = [];

            events.forEach(event => {
                if (event.status !== 'Confirmed') return;

                Object.entries(TASK_DEADLINES).forEach(([phase, tasks]) => {
                    tasks.forEach(task => {
                        const taskValue = event[task.key];
                        if (taskValue === 'No' || taskValue === false) {
                            const deadline = new Date(event.date);
                            deadline.setDate(deadline.getDate() + task.daysOffset);
                            openTasks.push({
                                eventId: event.id,
                                eventName: event.name,
                                owner: event.owner,
                                taskKey: task.key,
                                taskLabel: task.label,
                                deadline: deadline,
                                daysUntil: Math.ceil((deadline - now) / (1000 * 60 * 60 * 24))
                            });
                        }
                    });
                });
            });

            openTasks.sort((a, b) => a.deadline - b.deadline);

            const selectedOwners = Array.from(document.querySelectorAll('#tasksFilterOwner input[type="checkbox"]:checked')).map(cb => cb.value);
            const showAll = selectedOwners.includes('all');
            const filteredTasks = openTasks.filter(task => showAll || selectedOwners.includes(task.owner));

            if (filteredTasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No open tasks! All confirmed events are on track.</p></div>';
                return;
            }

            container.innerHTML = filteredTasks.map(task => {
                let className = '';
                if (task.daysUntil < 0) className = 'deadline-overdue';
                else if (task.daysUntil <= 7) className = 'deadline-soon';

                const deadlineStr = task.deadline.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const daysStr = task.daysUntil < 0 ? `${Math.abs(task.daysUntil)} days overdue` : `${task.daysUntil} days left`;

                return `
                    <div class="open-task-card ${className}">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" class="task-completion-checkbox" data-event-id="${task.eventId}" data-task-key="${task.taskKey}" style="width: 20px; height: 20px; cursor: pointer; accent-color: #1d5432;">
                            <div style="flex: 1;">
                                <div class="task-event-name">${task.eventName}</div>
                                <div class="task-description">${task.taskLabel}</div>
                                <div class="task-deadline">📅 ${deadlineStr} (${daysStr})</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.task-completion-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const eventId = parseInt(e.target.dataset.eventId);
                    const taskKey = e.target.dataset.taskKey;
                    const event = events.find(ev => ev.id === eventId);
                    if (event) {
                        event[taskKey] = e.target.checked ? 'Yes' : 'No';
                        saveEvents();
                        renderOpenTasks();
                    }
                });
            });
        }

        function formatDate(date) {
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        init();
    </script>
