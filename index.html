<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LES Ecology Center - Event Workflow Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #efe7de 100%);
            color: #2c2416;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #1d5432 0%, #2d7a52 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(29, 84, 50, 0.2);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .view-toggle button {
            padding: 10px 20px;
            border: 2px solid #d4cec0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .view-toggle button.active {
            background: #1d5432;
            color: white;
            border-color: #1d5432;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            display: none;
        }

        .stats-bar.active {
            display: grid;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2.2em;
            font-weight: 700;
            color: #1d5432;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #6a5a4a;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 500;
            margin-bottom: 8px;
            color: #5a4a3a;
            font-size: 0.9em;
        }

        .control-group select,
        .control-group input {
            padding: 10px;
            border: 1px solid #d4cec0;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95em;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #1d5432;
            box-shadow: 0 0 0 3px rgba(29, 84, 50, 0.1);
        }

        .control-group select[multiple] {
            min-height: 80px;
            padding: 8px;
        }

        .control-group select[multiple] option {
            padding: 6px;
            margin: 2px 0;
        }

        .control-group select[multiple] option:checked {
            background: #1d5432;
            color: white;
        }

        .events-view {
            display: grid;
            gap: 20px;
        }

        .event-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #1d5432;
            transition: all 0.3s ease;
        }

        .event-card:hover {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .event-card.past {
            border-left-color: #999;
            opacity: 0.8;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .event-title {
            flex: 1;
        }

        .event-title h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            color: #2c2416;
        }

        .event-meta {
            display: flex;
            gap: 20px;
            font-size: 0.95em;
            color: #6a5a4a;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .owner-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            background: #e8f0d8;
            color: #556b2f;
        }

        .owner-badge.maddy {
            background: #fce4e4;
            color: #8b3a3a;
        }

        .owner-badge.hadas {
            background: #e4f1fc;
            color: #3a5a8b;
        }

        .owner-badge.gretel {
            background: #f0e4fc;
            color: #5a3a8b;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-right: 4px;
        }

        .category-outreach {
            background: #fef3c7;
            color: #92400e;
        }

        .category-education {
            background: #e0f2fe;
            color: #0c4a6e;
        }

        .category-stewardship {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .status-planning {
            background: #fef3c7;
            color: #92400e;
        }

        .status-hold {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-confirmed {
            background: #dcfce7;
            color: #166534;
        }

        .progress-bar {
            width: 120px;
            height: 6px;
            background: #e8ddd0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1d5432, #2d7a52);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.85em;
            color: #6a5a4a;
            font-weight: 500;
        }

        .workflow-phases {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e8ddd0;
        }

        .phase {
            background: #f9f7f2;
            padding: 15px;
            border-radius: 8px;
        }

        .phase-title {
            font-weight: 600;
            color: #1d5432;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }

        .task input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1d5432;
        }

        .task label {
            flex: 1;
            cursor: pointer;
            user-select: none;
        }

        .task input[type="checkbox"]:checked + label {
            color: #999;
            text-decoration: line-through;
        }

        .task.na input[type="checkbox"],
        .task.na label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .open-task-card {
            background: white;
            border-left: 4px solid #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 12px;
        }

        .open-task-card.deadline-soon {
            border-left-color: #ffa94d;
        }

        .open-task-card.deadline-overdue {
            border-left-color: #ff6b6b;
            background: #ffe0e0;
        }

        .task-event-name {
            font-weight: 600;
            color: #1d5432;
            margin-bottom: 4px;
        }

        .task-description {
            color: #6a5a4a;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .task-deadline {
            font-size: 0.85em;
            color: #ff6b6b;
            font-weight: 500;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .calendar-container {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: none;
            width: 100%;
        }

        .calendar-container.active {
            display: block;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-header h2 {
            color: #1d5432;
            font-size: 1.5em;
            margin: 0;
        }

        .calendar-header button {
            background: #1d5432;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .calendar-header button:hover {
            background: #2d7a52;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(75px, 1fr));
            gap: 6px;
            width: 100%;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            color: #1d5432;
            padding: 15px 8px;
            background: #f9f7f2;
            border-radius: 6px;
        }

        .calendar-day {
            border: 1px solid #e8ddd0;
            border-radius: 6px;
            padding: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 85px;
            background: white;
            overflow: hidden;
        }

        .calendar-day:hover {
            background: #f9f7f2;
            border-color: #1d5432;
        }

        .calendar-day.other-month {
            color: #ccc;
            background: #fafaf8;
        }

        .calendar-day.today {
            background: #e8f5ed;
            border-color: #1d5432;
            font-weight: 600;
        }

        .calendar-day-number {
            font-weight: 600;
            color: #2c2416;
            margin-bottom: 2px;
            font-size: 0.85em;
        }

        .calendar-day-events {
            font-size: 0.65em;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .calendar-day-event {
            background: #1d5432;
            padding: 2px 4px;
            border-radius: 2px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            font-weight: 500;
            line-height: 1.1;
        }

        .calendar-day-event.outreach {
            background: #f59e0b;
        }

        .calendar-day-event.education {
            background: #3b82f6;
        }

        .calendar-day-event.stewardship {
            background: #10b981;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #1d5432;
            font-size: 1.3em;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #5a4a3a;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #d4cec0;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95em;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1d5432;
            box-shadow: 0 0 0 3px rgba(29, 84, 50, 0.1);
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .modal-buttons .save-btn {
            background: #1d5432;
            color: white;
        }

        .modal-buttons .save-btn:hover {
            background: #2d7a52;
        }

        .modal-buttons .cancel-btn {
            background: #e8ddd0;
            color: #2c2416;
        }

        .modal-buttons .cancel-btn:hover {
            background: #d4cec0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .event-header {
                flex-direction: column;
                gap: 10px;
            }

            .event-meta {
                flex-wrap: wrap;
            }

            .workflow-phases {
                grid-template-columns: 1fr;
            }

            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .calendar-day {
                min-height: 80px;
                font-size: 0.85em;
                padding: 8px;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Event Workflow Dashboard</h1>
            <p>LES Ecology Center - Street Tree Care & Community Engagement</p>
        </div>

        <div class="view-toggle">
            <button class="view-btn active" data-view="list">📋 List View</button>
            <button class="view-btn" data-view="calendar">📅 Calendar View</button>
            <button class="view-btn" data-view="tasks">📌 Open Tasks</button>
            <button id="statsBtn" style="margin-left: auto; padding: 10px 20px; border: 2px solid #d4cec0; background: white; border-radius: 8px; cursor: pointer; font-weight: 500;">📊 Stats</button>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-number" id="totalEvents">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="upcomingEvents">0</div>
                <div class="stat-label">Upcoming</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedEvents">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgProgress">0%</div>
                <div class="stat-label">Avg Progress</div>
            </div>
        </div>

        <div id="listView" class="list-view-container">
            <div class="controls">
                <div class="control-group">
                    <label for="filterOwner">Filter by Owner (Select Multiple)</label>
                    <select id="filterOwner" multiple>
                        <option value="Maddy">Maddy</option>
                        <option value="Hadas">Hadas</option>
                        <option value="Gretel">Gretel</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filterTiming">Filter by Timing</label>
                    <select id="filterTiming">
                        <option value="">All Events</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="past">Past</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filterCategory">Filter by Category (Select Multiple)</label>
                    <select id="filterCategory" multiple>
                        <option value="Outreach">Outreach</option>
                        <option value="Education">Education</option>
                        <option value="Stewardship">Stewardship</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filterStatus">Filter by Status (Select Multiple)</label>
                    <select id="filterStatus" multiple>
                        <option value="Planning">Planning</option>
                        <option value="Hold">Hold</option>
                        <option value="Confirmed">Confirmed</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="sortOrder">Sort Events</label>
                    <select id="sortOrder">
                        <option value="earliest">Earliest to Latest</option>
                        <option value="latest">Latest to Earliest</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="searchEvents">Search Events</label>
                    <input type="text" id="searchEvents" placeholder="Search by name or location...">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button id="addEventBtnList" style="padding: 10px 20px; background: #1d5432; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;">+ Add Event</button>
                </div>
            </div>

            <div class="events-view" id="eventsContainer">
                <div class="empty-state">
                    <p>No events loaded yet.</p>
                </div>
            </div>
        </div>

        <div id="tasksView" class="tasks-view-container" style="display: none;">
            <div id="openTasksContainer"></div>
        </div>

        <div id="calendarView" class="calendar-container">
            <div class="calendar-header">
                <div>
                    <button id="prevMonth">← Previous</button>
                    <h2 id="calendarTitle" style="display: inline-block; margin: 0 20px;"></h2>
                    <button id="nextMonth">Next →</button>
                </div>
                <button id="addEventBtn">+ Add Event</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <!-- Event Creation Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Event</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" required placeholder="e.g., Spring Tree Care">
                </div>
                <div class="form-group">
                    <label for="eventDate">Date</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventTime">Start Time</label>
                    <input type="time" id="eventTime">
                </div>
                <div class="form-group">
                    <label for="eventEndTime">End Time</label>
                    <input type="time" id="eventEndTime">
                </div>
                <div class="form-group">
                    <label for="eventOwner">Owner</label>
                    <select id="eventOwner" required>
                        <option value="">Select Owner</option>
                        <option value="Maddy">Maddy</option>
                        <option value="Hadas">Hadas</option>
                        <option value="Gretel">Gretel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventLocation">Location</label>
                    <input type="text" id="eventLocation" placeholder="e.g., Tompkins Square Park">
                </div>
                <div class="form-group">
                    <label for="eventPrimaryCategory">Primary Category</label>
                    <select id="eventPrimaryCategory" required>
                        <option value="">Select Category</option>
                        <option value="Outreach">Outreach</option>
                        <option value="Education">Education</option>
                        <option value="Stewardship">Stewardship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventSecondaryCategory">Secondary Category (Optional)</label>
                    <select id="eventSecondaryCategory">
                        <option value="">None</option>
                        <option value="Outreach">Outreach</option>
                        <option value="Education">Education</option>
                        <option value="Stewardship">Stewardship</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventType">Event Type</label>
                    <input type="text" id="eventType" placeholder="e.g., Workshop, Tabling, STC Event">
                </div>
                <div class="form-group">
                    <label for="eventStatus">Status</label>
                    <select id="eventStatus" required>
                        <option value="Planning">Planning</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Hold">Hold</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventNotes">Notes</label>
                    <textarea id="eventNotes" placeholder="Any additional notes..."></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
                    <button type="submit" class="save-btn">Create Event</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let events = [];
        let filteredEvents = [];
        let currentMonth = new Date();
        let selectedDate = null;

        const CATEGORY_COLORS = {
            'Outreach': '#f59e0b',
            'Education': '#3b82f6',
            'Stewardship': '#10b981'
        };

        const TASK_DEADLINES = {
            setup: [
                { key: 'brief', label: 'Event Brief Created', daysOffset: -30 },
                { key: 'eventbrite', label: 'EventBrite Created', daysOffset: -30 },
                { key: 'calendar', label: 'Calendar Event Created', daysOffset: 0 },
                { key: 'comms', label: 'Comms Form Submitted', daysOffset: -30 }
            ],
            execution: [
                { key: 'compost', label: 'Order Placed on Compost Tracker', daysOffset: -14 },
                { key: 'opsCheckin', label: 'Compost Ops Check-In', daysOffset: -7 },
                { key: 'reminder', label: 'Reminder Email Sent', daysOffset: -7 }
            ],
            completion: [
                { key: 'report', label: 'Activity Report Completed', daysOffset: 1 },
                { key: 'treeMap', label: 'Tree Map Data Completed', daysOffset: 1 },
                { key: 'thankYou', label: 'Thank You Email Sent', daysOffset: 1 }
            ]
        };

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            document.getElementById('calendarTitle').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();

            let html = '';

            const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayHeaders.forEach(day => {
                html += `<div class="calendar-day-header">${day}</div>`;
            });

            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const isToday = dateObj.toDateString() === today.toDateString();
                let dayEvents = events.filter(e => e.date.toDateString() === dateObj.toDateString());
                const eventsList = dayEvents.map(e => {
                    const color = CATEGORY_COLORS[e.primaryCategory] || '#1d5432';
                    return `<div class="calendar-day-event" style="background: ${color};">${e.name}</div>`;
                }).join('');

                const todayClass = isToday ? 'today' : '';
                html += `<div class="calendar-day ${todayClass}" onclick="openEventModal(new Date(${year}, ${month}, ${day}))" style="min-height: 85px;"><div class="calendar-day-number">${day}</div><div class="calendar-day-events">${eventsList}</div></div>`;
            }

            const totalCells = firstDay + daysInMonth;
            const remainingDays = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            document.getElementById('calendarGrid').innerHTML = html;
        }

        function openEventModal(date) {
            selectedDate = date;
            document.getElementById('eventDate').value = formatDateForInput(date);
            document.getElementById('eventModal').classList.add('active');
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('active');
            document.getElementById('eventForm').reset();
        }

        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function switchView(view) {
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-view="${view}"]`).classList.add('active');

            document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('calendarView').classList.toggle('active', view === 'calendar');
            document.getElementById('tasksView').style.display = view === 'tasks' ? 'block' : 'none';

            if (view === 'calendar') renderCalendar();
            if (view === 'tasks') renderOpenTasks();
        }

        function init() {
            loadEvents();
            setupEventListeners();
            setupCalendarListeners();
            applyFilters();
        }

        function setupCalendarListeners() {
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => switchView(e.target.dataset.view));
            });

            document.getElementById('statsBtn').addEventListener('click', () => {
                const statsBar = document.getElementById('statsBar');
                statsBar.classList.toggle('active');
            });

            document.getElementById('prevMonth').addEventListener('click', () => {
                currentMonth.setMonth(currentMonth.getMonth() - 1);
                renderCalendar();
            });

            document.getElementById('nextMonth').addEventListener('click', () => {
                currentMonth.setMonth(currentMonth.getMonth() + 1);
                renderCalendar();
            });

            document.getElementById('addEventBtn').addEventListener('click', () => openEventModal(new Date()));
            document.getElementById('addEventBtnList').addEventListener('click', () => openEventModal(new Date()));
            document.getElementById('closeModal').addEventListener('click', closeEventModal);
            document.getElementById('cancelBtn').addEventListener('click', closeEventModal);

            document.getElementById('eventModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('eventModal')) closeEventModal();
            });

            document.getElementById('eventForm').addEventListener('submit', (e) => {
                e.preventDefault();

                const primaryCategory = document.getElementById('eventPrimaryCategory').value;
                const secondaryCategory = document.getElementById('eventSecondaryCategory').value;
                const category = secondaryCategory ? `${primaryCategory}, ${secondaryCategory}` : primaryCategory;

                const newEvent = {
                    id: Math.max(...events.map(e => e.id), 0) + 1,
                    name: document.getElementById('eventName').value,
                    owner: document.getElementById('eventOwner').value,
                    date: new Date(document.getElementById('eventDate').value),
                    time: document.getElementById('eventTime').value || '12:00 PM',
                    endTime: document.getElementById('eventEndTime').value || '',
                    location: document.getElementById('eventLocation').value,
                    primaryCategory: primaryCategory,
                    secondaryCategory: secondaryCategory,
                    category: category,
                    type: document.getElementById('eventType').value,
                    status: document.getElementById('eventStatus').value || 'Planning',
                    brief: 'No', eventbrite: 'No', calendar: 'No', comms: 'No',
                    compost: 'No', opsCheckin: 'No', reminder: 'No',
                    report: 'No', treeMap: 'No', thankYou: 'No'
                };

                events.push(newEvent);
                saveEvents();
                closeEventModal();
                renderCalendar();
                applyFilters();
            });
        }

        function getSampleData() {
            const data = [
                { id: 1, name: 'MulchFest', owner: 'Maddy', date: new Date(2026, 0, 10), time: '2:00 AM', endTime: '', location: 'Tompkins Square Park', primaryCategory: 'Outreach', secondaryCategory: '', category: 'Outreach', type: 'Tabling', status: 'Confirmed', brief: 'Yes', eventbrite: 'Yes', calendar: 'Yes', comms: 'Yes', compost: 'Yes', opsCheckin: 'Yes', reminder: 'Yes', report: 'Yes', treeMap: 'No', thankYou: 'No' },
                { id: 2, name: 'Spring into Tree Care', owner: 'Maddy', date: new Date(2026, 2, 22), time: '12:00 AM', endTime: '', location: '', primaryCategory: 'Stewardship', secondaryCategory: '', category: 'Stewardship', type: 'Public Volunteer STC Event', status: 'Confirmed', brief: 'Yes', eventbrite: 'Yes', calendar: 'Yes', comms: 'Yes', compost: 'Yes', opsCheckin: 'No', reminder: 'Yes', report: 'Yes', treeMap: 'No', thankYou: 'Yes' },
                { id: 3, name: 'STC with PS/MS 188', owner: 'Hadas', date: new Date(2026, 2, 24), time: '2:00 PM', endTime: '', location: 'P.S. 188', primaryCategory: 'Education', secondaryCategory: 'Stewardship', category: 'Education, Stewardship', type: 'School STC Event', status: 'Confirmed', brief: 'No', eventbrite: 'No', calendar: 'Yes', comms: 'No', compost: 'No', opsCheckin: 'Yes', reminder: 'Yes', report: 'Yes', treeMap: 'Yes', thankYou: 'Yes' }
            ];
            return data;
        }

        function loadEvents() {
            const stored = localStorage.getItem('lesEvents');
            if (stored) {
                const parsed = JSON.parse(stored);
                if (parsed.length === 0 || !parsed[0].status) {
                    events = getSampleData();
                } else {
                    events = parsed.map(e => ({
                        ...e,
                        date: new Date(e.date),
                        status: e.status || 'Planning',
                        location: e.location || '',
                        primaryCategory: e.primaryCategory || e.category || 'Outreach',
                        secondaryCategory: e.secondaryCategory || ''
                    }));
                }
            } else {
                events = getSampleData();
            }
        }

        function saveEvents() {
            localStorage.setItem('lesEvents', JSON.stringify(events));
        }

        function setupEventListeners() {
            document.getElementById('filterOwner').addEventListener('change', applyFilters);
            document.getElementById('filterTiming').addEventListener('change', applyFilters);
            document.getElementById('filterStatus').addEventListener('change', applyFilters);
            document.getElementById('filterCategory').addEventListener('change', applyFilters);
            document.getElementById('sortOrder').addEventListener('change', applyFilters);
            document.getElementById('searchEvents').addEventListener('input', applyFilters);
        }

        function applyFilters() {
            const ownerSelect = document.getElementById('filterOwner');
            const selectedOwners = Array.from(ownerSelect.selectedOptions).map(o => o.value);

            const timing = document.getElementById('filterTiming').value;
            const sortOrder = document.getElementById('sortOrder').value;
            const search = document.getElementById('searchEvents').value.toLowerCase();

            const categorySelect = document.getElementById('filterCategory');
            const selectedCategories = Array.from(categorySelect.selectedOptions).map(o => o.value);

            const statusSelect = document.getElementById('filterStatus');
            const selectedStatuses = Array.from(statusSelect.selectedOptions).map(o => o.value);

            const now = new Date();

            filteredEvents = events.filter(event => {
                if (selectedOwners.length > 0 && !selectedOwners.includes(event.owner)) return false;

                if (selectedCategories.length > 0) {
                    const hasMatchingCategory = selectedCategories.some(cat =>
                        event.category.toLowerCase().includes(cat.toLowerCase())
                    );
                    if (!hasMatchingCategory) return false;
                }

                if (selectedStatuses.length > 0 && !selectedStatuses.includes(event.status)) return false;

                if (timing === 'upcoming' && event.date < now) return false;
                if (timing === 'past' && event.date >= now) return false;

                const location = event.location || '';
                if (search && !event.name.toLowerCase().includes(search) && !location.toLowerCase().includes(search)) return false;

                return true;
            });

            filteredEvents.sort((a, b) => sortOrder === 'latest' ? b.date - a.date : a.date - b.date);

            updateStats();
            renderEvents();
        }

        function updateStats() {
            const now = new Date();
            const upcoming = events.filter(e => e.date >= now).length;
            const completed = events.filter(e => (e.report === 'Yes' || e.report === true) && (e.treeMap === 'Yes' || e.treeMap === true)).length;
            const avgProgress = events.length > 0 ? Math.round(events.reduce((sum, e) => sum + getEventProgress(e), 0) / events.length) : 0;

            document.getElementById('totalEvents').textContent = events.length;
            document.getElementById('upcomingEvents').textContent = upcoming;
            document.getElementById('completedEvents').textContent = completed;
            document.getElementById('avgProgress').textContent = avgProgress + '%';
        }

        function getEventProgress(event) {
            let completed = 0, total = 0;
            Object.values(TASK_DEADLINES).forEach(phase => {
                phase.forEach(task => {
                    const value = event[task.key];
                    if (value !== 'N/A') {
                        total++;
                        if (value === 'Yes' || value === true) completed++;
                    }
                });
            });
            return total > 0 ? Math.round((completed / total) * 100) : 0;
        }

        function renderEvents() {
            const container = document.getElementById('eventsContainer');
            if (filteredEvents.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No events match your filters.</p></div>';
                return;
            }

            const now = new Date();
            container.innerHTML = filteredEvents.map(event => {
                const isPast = event.date < now;
                const progress = getEventProgress(event);

                return `
                    <div class="event-card ${isPast ? 'past' : ''}">
                        <div class="event-header">
                            <div class="event-title">
                                <h3>${event.name}</h3>
                                <div style="margin-bottom: 8px;">
                                    <span class="category-badge category-${event.primaryCategory.toLowerCase()}">${event.primaryCategory}</span>
                                    ${event.secondaryCategory ? `<span class="category-badge category-${event.secondaryCategory.toLowerCase()}">${event.secondaryCategory}</span>` : ''}
                                    <span class="status-badge status-${(event.status || 'planning').toLowerCase()}">${event.status || 'Planning'}</span>
                                </div>
                                <div class="event-meta">
                                    <span class="owner-badge ${event.owner.toLowerCase()}">${event.owner}</span>
                                    <span class="meta-item">📅 ${formatDate(event.date)} ${event.time}${event.endTime ? ' - ' + event.endTime : ''}</span>
                                    ${event.location ? `<span class="meta-item">📍 ${event.location}</span>` : ''}
                                </div>
                            </div>
                            <div class="event-status">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <div class="progress-text">${progress}% complete</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderOpenTasks() {
            const container = document.getElementById('openTasksContainer');
            const now = new Date();
            const openTasks = [];

            events.forEach(event => {
                if (event.status !== 'Confirmed') return;

                Object.entries(TASK_DEADLINES).forEach(([phase, tasks]) => {
                    tasks.forEach(task => {
                        const taskValue = event[task.key];
                        if (taskValue === 'No' || taskValue === false) {
                            const deadline = new Date(event.date);
                            deadline.setDate(deadline.getDate() + task.daysOffset);
                            openTasks.push({
                                eventId: event.id,
                                eventName: event.name,
                                taskLabel: task.label,
                                deadline: deadline,
                                daysUntil: Math.ceil((deadline - now) / (1000 * 60 * 60 * 24))
                            });
                        }
                    });
                });
            });

            openTasks.sort((a, b) => a.deadline - b.deadline);

            if (openTasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No open tasks! All confirmed events are on track.</p></div>';
                return;
            }

            container.innerHTML = openTasks.map(task => {
                let className = '';
                if (task.daysUntil < 0) className = 'deadline-overdue';
                else if (task.daysUntil <= 7) className = 'deadline-soon';

                const deadlineStr = task.deadline.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const daysStr = task.daysUntil < 0 ? `${Math.abs(task.daysUntil)} days overdue` : `${task.daysUntil} days left`;

                return `
                    <div class="open-task-card ${className}">
                        <div class="task-event-name">${task.eventName}</div>
                        <div class="task-description">${task.taskLabel}</div>
                        <div class="task-deadline">📅 ${deadlineStr} (${daysStr})</div>
                    </div>
                `;
            }).join('');
        }

        function formatDate(date) {
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        init();
    </script>
</body>
